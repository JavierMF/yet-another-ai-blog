baseURL = "https://javierm.github.io/yet-another-ai-blog/"
title = "Yet Another AI Blog"
defaultContentLanguage = "es"
defaultContentLanguageInSubdir = false
hasCJKLanguage = false
enableGitInfo = true
enableRobotsTXT = true
timeZone = "Europe/Madrid"

[pagination]
  pagerSize = 10

[outputs]
  home = ["HTML", "RSS", "JSON"]

[taxonomies]
  category = "categories"
  tag = "tags"

[module]
  [[module.imports]]
    path = "github.com/geekifan/hugo-theme-chirpy"

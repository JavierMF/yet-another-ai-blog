<svg width="100%" viewBox="0 0 520 380" role="img" xmlns="http://www.w3.org/2000/svg">
<rect width="100%" height="100%" fill="white" rx="8"/>
<title>GTD architecture with Claude and Notion MCP</title>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Claude -->
<g>
  <rect x="170" y="20" width="180" height="56" rx="8" stroke-width="0.5" style="fill:rgb(238,237,254);stroke:rgb(83,74,183);"/>
  <text x="260" y="44" text-anchor="middle" dominant-baseline="central" style="fill:rgb(60,52,137);font-family:-apple-system,system-ui,'Segoe UI',sans-serif;font-size:14px;font-weight:500;">Claude</text>
  <text x="260" y="64" text-anchor="middle" dominant-baseline="central" style="fill:rgb(83,74,183);font-family:-apple-system,system-ui,'Segoe UI',sans-serif;font-size:12px;">with GTD skill</text>
</g>

<!-- Arrow Claude → Notion MCP -->
<line x1="260" y1="76" x2="260" y2="140" marker-end="url(#arrow)" style="fill:none;stroke:rgb(115,114,108);stroke-width:1.5px;"/>

<!-- Notion MCP -->
<g>
  <rect x="150" y="140" width="220" height="56" rx="8" stroke-width="0.5" style="fill:rgb(250,238,218);stroke:rgb(133,79,11);"/>
  <text x="260" y="163" text-anchor="middle" dominant-baseline="central" style="fill:rgb(99,56,6);font-family:-apple-system,system-ui,'Segoe UI',sans-serif;font-size:14px;font-weight:500;">Notion MCP</text>
  <text x="260" y="183" text-anchor="middle" dominant-baseline="central" style="fill:rgb(133,79,11);font-family:-apple-system,system-ui,'Segoe UI',sans-serif;font-size:12px;">Official Notion connector</text>
</g>

<!-- Arrow Notion MCP → Inbox (left) -->
<line x1="200" y1="196" x2="90" y2="270" marker-end="url(#arrow)" style="fill:none;stroke:rgb(115,114,108);stroke-width:1.5px;"/>

<!-- Arrow Notion MCP → Next Actions (center) -->
<line x1="260" y1="196" x2="260" y2="270" marker-end="url(#arrow)" style="fill:none;stroke:rgb(115,114,108);stroke-width:1.5px;"/>

<!-- Arrow Notion MCP → Projects (right) -->
<line x1="320" y1="196" x2="430" y2="270" marker-end="url(#arrow)" style="fill:none;stroke:rgb(115,114,108);stroke-width:1.5px;"/>

<!-- DB Inbox -->
<g>
  <rect x="10" y="270" width="160" height="56" rx="8" stroke-width="0.5" style="fill:rgb(225,245,238);stroke:rgb(15,110,86);"/>
  <text x="90" y="293" text-anchor="middle" dominant-baseline="central" style="fill:rgb(8,80,65);font-family:-apple-system,system-ui,'Segoe UI',sans-serif;font-size:14px;font-weight:500;">DB Inbox</text>
  <text x="90" y="313" text-anchor="middle" dominant-baseline="central" style="fill:rgb(15,110,86);font-family:-apple-system,system-ui,'Segoe UI',sans-serif;font-size:12px;">Unprocessed entries</text>
</g>

<!-- DB Next Actions -->
<g>
  <rect x="180" y="270" width="160" height="56" rx="8" stroke-width="0.5" style="fill:rgb(225,245,238);stroke:rgb(15,110,86);"/>
  <text x="260" y="293" text-anchor="middle" dominant-baseline="central" style="fill:rgb(8,80,65);font-family:-apple-system,system-ui,'Segoe UI',sans-serif;font-size:14px;font-weight:500;">DB Next Actions</text>
  <text x="260" y="313" text-anchor="middle" dominant-baseline="central" style="fill:rgb(15,110,86);font-family:-apple-system,system-ui,'Segoe UI',sans-serif;font-size:12px;">Individual tasks</text>
</g>

<!-- DB Projects -->
<g>
  <rect x="350" y="270" width="160" height="56" rx="8" stroke-width="0.5" style="fill:rgb(225,245,238);stroke:rgb(15,110,86);"/>
  <text x="430" y="293" text-anchor="middle" dominant-baseline="central" style="fill:rgb(8,80,65);font-family:-apple-system,system-ui,'Segoe UI',sans-serif;font-size:14px;font-weight:500;">DB Projects</text>
  <text x="430" y="313" text-anchor="middle" dominant-baseline="central" style="fill:rgb(15,110,86);font-family:-apple-system,system-ui,'Segoe UI',sans-serif;font-size:12px;">Projects &amp; subtasks</text>
</g>

</svg>
